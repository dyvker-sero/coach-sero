<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coach SERO · Tu guía de bienestar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;--s4:#2a2a2a;
  --t1:#f0f0ee;--t2:#a0a09a;--t3:#585854;--t4:#323230;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.11);
  --g:#1DB954;--gh:#22d45f;--gdim:rgba(29,185,84,.10);--gglow:rgba(29,185,84,.20);
  --v:#a78bfa;--vdim:rgba(167,139,250,.10);--vglow:rgba(167,139,250,.22);
  --r:14px;--r2:10px;--rp:100px;
  --fb:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow:hidden}

#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative}

/* HEADER */
#hdr{flex-shrink:0;background:var(--s1);border-bottom:.5px solid var(--line);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{width:72px;height:28px;object-fit:contain;mix-blend-mode:screen}
.coach-badge{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--v);text-transform:uppercase;background:var(--vdim);border:.5px solid var(--vglow);padding:3px 8px;border-radius:var(--rp)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:beat 2s ease-in-out infinite}
@keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#chat::-webkit-scrollbar{width:2px}
#chat::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}

.msg{display:flex;gap:9px;max-width:94%;animation:msgIn .32s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.coach{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.av.cav{background:var(--vdim);border:.5px solid var(--vglow);color:var(--v)}
.av.uav{background:var(--gdim);border:.5px solid var(--gglow);font-size:11px;font-weight:600;color:var(--g)}

.bub{padding:11px 14px;border-radius:var(--r);font-size:14px;line-height:1.65;max-width:100%}
.coach .bub{background:var(--s2);border:.5px solid var(--line2);color:var(--t1);border-top-left-radius:4px}
.user .bub{background:var(--vdim);border:.5px solid var(--vglow);color:var(--t1);border-top-right-radius:4px}

.typing-dots{display:flex;gap:4px;padding:3px 1px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:dot 1.2s ease-in-out infinite}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

/* PRACTICE CARD */
.pcard{background:var(--s2);border:.5px solid var(--gglow);border-radius:var(--r);padding:14px;margin:4px 0 0;cursor:pointer;transition:background .15s;display:block}
.pcard:hover{background:var(--s3)}
.pcard-type{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--g);text-transform:uppercase;margin-bottom:4px}
.pcard-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.pcard-desc{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.pcard-foot{display:flex;align-items:center;justify-content:space-between}
.pcard-dur{font-size:11px;color:var(--t3)}
.pcard-btn{background:var(--g);color:#000;border:none;border-radius:var(--rp);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fb)}

/* GENERATED PRACTICE */
.gcard{background:var(--s2);border:.5px solid var(--vglow);border-radius:var(--r);padding:14px;margin:4px 0 0}
.gcard-type{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--v);text-transform:uppercase;margin-bottom:4px}
.gcard-title{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.gcard-dur{font-size:11px;color:var(--t3);margin-bottom:12px}
.gstep{display:flex;gap:9px;margin-bottom:9px}
.gstep-num{color:var(--v);font-weight:600;font-size:13px;flex-shrink:0;width:16px}
.gstep-text{font-size:13px;color:var(--t2);line-height:1.55}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 4px}
.chip{background:var(--s2);border:.5px solid var(--line2);border-radius:var(--rp);padding:7px 13px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--fb);-webkit-tap-highlight-color:transparent}
.chip:hover,.chip:active{background:var(--s3);border-color:var(--v);color:var(--t1)}

/* MOOD GRID */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%}
.mbtn{background:var(--s2);border:.5px solid var(--line2);border-radius:var(--r2);padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;font-family:var(--fb);-webkit-tap-highlight-color:transparent}
.mbtn:hover,.mbtn:active{border-color:var(--v);background:var(--s3)}
.memo{font-size:20px;display:block;margin-bottom:3px}
.mlbl{font-size:10px;color:var(--t3)}

/* PLAYER MODAL */
#player-modal{
  display:none;
  position:absolute;inset:0;
  background:rgba(0,0,0,.85);
  z-index:100;
  flex-direction:column;
  animation:fadeIn .2s ease both;
}
#player-modal.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

#player-inner{
  margin:auto;
  width:calc(100% - 32px);
  max-width:460px;
  background:var(--s1);
  border:.5px solid var(--line2);
  border-radius:var(--r);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

#player-header{
  padding:14px 16px 12px;
  border-bottom:.5px solid var(--line);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
}
#player-type{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--g);text-transform:uppercase;margin-bottom:3px}
#player-title{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3}
#player-dur{font-size:11px;color:var(--t3);margin-top:2px}
#player-close{
  background:var(--s2);border:.5px solid var(--line2);border-radius:50%;
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:14px;
  transition:background .15s;
}
#player-close:hover{background:var(--s3);color:var(--t1)}

#player-frame-wrap{
  position:relative;
  width:100%;
  padding-bottom:56.25%;
  background:#000;
  flex-shrink:0;
}
#player-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
}

#player-sero-bar{
  padding:12px 16px;
  display:flex;align-items:center;gap:10px;
  background:var(--s2);
}
.psb-logo{width:48px;height:18px;object-fit:contain;mix-blend-mode:screen;flex-shrink:0}
.psb-text{font-size:11px;color:var(--t3);line-height:1.4}
.psb-text strong{color:var(--t2)}

/* INPUT */
#input-area{flex-shrink:0;background:var(--s1);border-top:.5px solid var(--line);padding:10px 12px;display:flex;align-items:flex-end;gap:8px}
#minput{flex:1;background:var(--s2);border:.5px solid var(--line2);border-radius:var(--r);padding:10px 13px;font-size:14px;color:var(--t1);font-family:var(--fb);outline:none;resize:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color .2s;-webkit-appearance:none}
#minput:focus{border-color:var(--v)}
#minput::placeholder{color:var(--t4)}
#sbtn{width:40px;height:40px;flex-shrink:0;background:var(--v);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
#sbtn:hover{background:#b99ff8}
#sbtn:active{transform:scale(.93)}
#sbtn:disabled{background:var(--s3);cursor:default}

#disc{flex-shrink:0;text-align:center;font-size:10px;color:var(--t4);padding:4px 12px 8px;background:var(--s1)}
#newbtn{background:none;border:.5px solid var(--line2);border-radius:var(--rp);padding:5px 10px;font-size:10px;color:var(--t3);cursor:pointer;font-family:var(--fb);transition:all .15s}
#newbtn:hover{border-color:var(--t3);color:var(--t2)}
</style>
</head>

  generated: {

    "body-scan":{title:"Body Scan Express",type:"Body Scan",dur:"7 min",steps:["Recuéstate o siéntate con los ojos cerrados. Respira naturalmente.","Lleva tu atención a los pies. Nota cualquier sensación sin juicio.","Sube lentamente: pantorrillas, rodillas, muslos. Solo observa.","Continúa hacia la pelvis, abdomen, pecho. Respira hacia las zonas tensas.","Hombros, brazos, manos. Afloja conscientemente donde haya tensión.","Cuello, mandíbula, frente. Suelta la mandíbula y las cejas.","Termina con una respiración profunda y deja que todo el cuerpo se suelte al exhalar."]},

    "5-4-3-2-1":{title:"Grounding 5-4-3-2-1",type:"Mindfulness",dur:"5 min",steps:["Esta técnica ancla tu sistema nervioso al presente usando los 5 sentidos.","Nombra 5 cosas que puedes VER ahora mismo. Descríbelas con detalle.","Nombra 4 cosas que puedes TOCAR. Siente la textura y temperatura de cada una.","Nombra 3 cosas que puedes ESCUCHAR. Incluye sonidos lejanos.","Nombra 2 cosas que puedes OLER (o recuerda 2 olores que te gusten).","Nombra 1 cosa que puedes SABOREAR. Nota cualquier sabor en tu boca.","Haz una respiración profunda. El grounding interrumpe el bucle mental y regresa al cuerpo."]}
  }

// ── STATE ─────────────────────────────────────────────────────
let phase = "greeting";
let detectedMood = null;
let detectedMoodLabel = null;
let userName = "";
let isLoading = false;

const chat = document.getElementById("chat");
const input = document.getElementById("minput");
const sbtn = document.getElementById("sbtn");

// ── PLAYER ────────────────────────────────────────────────────
function openPlayer(content) {
  document.getElementById("player-type").textContent = content.type;
  document.getElementById("player-title").textContent = content.title;
  document.getElementById("player-dur").textContent = "⏱ " + content.dur;

  // Use Drive embed URL — removes Drive UI, shows clean video player
  const embedUrl = content.driveId && !content.url
    ? `https://drive.google.com/file/d/${content.driveId}/preview`
    : (content.url || `https://drive.google.com/file/d/${content.driveId}/preview`);

  document.getElementById("player-frame").src = embedUrl;
  document.getElementById("player-modal").classList.add("open");
}

function closePlayer() {
  document.getElementById("player-modal").classList.remove("open");
  document.getElementById("player-frame").src = "";
}

// ── RENDER HELPERS ────────────────────────────────────────────
function scrollEnd(){ setTimeout(()=>chat.scrollTop=chat.scrollHeight,60) }

function addMsg(role, html, extra){
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const av = document.createElement("div");
  av.className = `av ${role==="coach"?"cav":"uav"}`;
  av.textContent = role==="coach" ? "✦" : (userName?userName[0].toUpperCase():"U");
  const bub = document.createElement("div");
  bub.className = "bub";
  bub.innerHTML = html.replace(/\n/g,"<br>");
  div.appendChild(av);
  div.appendChild(bub);
  chat.appendChild(div);
  if(extra) chat.appendChild(extra);
  scrollEnd();
  return div;
}

function showTyping(){
  const d = document.createElement("div");
  d.className = "msg coach"; d.id="typ";
  const av = document.createElement("div");
  av.className = "av cav"; av.textContent="✦";
  const b = document.createElement("div");
  b.className = "bub";
  b.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  d.appendChild(av); d.appendChild(b);
  chat.appendChild(d); scrollEnd();
}

function hideTyping(){ const e=document.getElementById("typ"); if(e)e.remove(); }

function addChips(opts, cb){
  const w = document.createElement("div");
  w.className = "chips";
  opts.forEach(o=>{
    const b = document.createElement("button");
    b.className = "chip"; b.textContent = o;
    b.onclick = ()=>{ w.remove(); cb(o); };
    w.appendChild(b);
  });
  chat.appendChild(w); scrollEnd();
}

// MOOD GRID — emociones relevantes en entorno laboral, gender neutral
function addMoods(cb){
  const moods=[
    {e:"😰",l:"Ansiosx"},
    {e:"😤",l:"Frustrадx"},
    {e:"🤯",l:"Abrumадx"},
    {e:"😩",l:"Agotадx"},
    {e:"😶",l:"Bloqueадx"},
    {e:"😬",l:"Nerviosx"},
    {e:"😔",l:"Desanimадx"},
    {e:"🌀",l:"Desenfocадx"},
  ];
  const g = document.createElement("div");
  g.className = "mgrid";
  moods.forEach(m=>{
    const b = document.createElement("button");
    b.className = "mbtn";
    b.innerHTML = `<span class="memo">${m.e}</span><span class="mlbl">${m.l}</span>`;
    b.onclick = ()=>{ g.remove(); cb(m.l.replace(/[хx]$/,"x")); };
    g.appendChild(b);
  });
  chat.appendChild(g); scrollEnd();
}

function renderCard(content){
  const d = document.createElement("div");
  d.className = "pcard";
  d.innerHTML = `
    <div class="pcard-type">${content.type}</div>
    <div class="pcard-title">${content.title}</div>
    <div class="pcard-desc">${content.desc}</div>
    <div class="pcard-foot">
      <span class="pcard-dur">⏱ ${content.dur}</span>
      <button class="pcard-btn">Comenzar →</button>
    </div>`;
  d.querySelector(".pcard-btn").onclick = (e)=>{ e.stopPropagation(); openPlayer(content); };
  d.onclick = ()=>openPlayer(content);
  chat.appendChild(d); scrollEnd();
}

function renderGeneratedCard(p){
  const d = document.createElement("div");
  d.className = "gcard";
  const steps = p.steps.map((s,i)=>
    `<div class="gstep"><span class="gstep-num">${i+1}.</span><span class="gstep-text">${s}</span></div>`
  ).join("");
  d.innerHTML = `
    <div class="gcard-type">${p.type}</div>
    <div class="gcard-title">${p.title}</div>
    <div class="gcard-dur">⏱ ${p.dur}</div>
    ${steps}`;
  chat.appendChild(d); scrollEnd();
}

// ── COACH LOGIC ───────────────────────────────────────────────
const MOOD_MAP = {
  "ansiosx":  {key:"ansioso", label:"ansiedad"},
  "frustrадx":  {key:"frustrado", label:"frustración"},
  "abrumадx": {key:"abrumado", label:"saturación"},
  "agotадx":  {key:"agotado",  label:"agotamiento"},
  "bloqueадx":{key:"bloqueado",label:"bloqueo mental"},
  "nerviosx": {key:"nervioso", label:"nerviosismo"},
  "desanimадx":{key:"triste",  label:"tristeza"},
  "desenfocадx":{key:"desenfocado",label:"falta de foco"},
};

function detectMoodFromText(text){
  const t = text.toLowerCase();
  const map = {
    ansioso:["ansio","ansiedad","pánico","panico","angustia","agitad"],
    estresado:["estres","estrés","presión","presion","sobrecarga"],
    frustrado:["frustrad","frustración","molest","harto","irritad"],
    abrumado:["abrumad","saturad","overwhelm","demasiado","mucho","espiral"],
    desenfocado:["desenfoc","distraíd","distraid","foco","concentr","scatter"],
    agotado:["agotad","cansad","exhaust","sin energía","sin energia","fatiga","quemad"],
    preocupado:["preocup","rumiand","dando vueltas"],
    bloqueado:["bloqueado","paraliz","no puedo","no avanzo"],
    irritable:["irritabl","irritad","susceptibl"],
    nervioso:["nervios","nervioso","antes de","reunión","junta","presentación"],
    triste:["trist","desanim","bajón","vacío","apagad"],
    enojado:["enoj","enojad","rabia","ira","molest"]
  };
  for(const [mood,kws] of Object.entries(map)){
    if(kws.some(k=>t.includes(k))) return mood;
  }
  return null;
}

function matchContent(moodKey, durText){
  const durNum = parseInt(durText)||5;
  // Score each item by tag match + duration fit
  const scored = LIBRARY.map(c=>{
    const tagScore = c.tags.filter(tag=>
      moodKey&&(tag.includes(moodKey)||moodKey.includes(tag))
    ).length;
    const durFit = parseInt(c.dur)<=durNum+5 ? 1 : 0;
    return {c, score: tagScore*2 + durFit};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  return scored.length>0 ? scored[0].c : null;
}

function pickGenerated(moodKey, durText){
  const durNum = parseInt(durText)||5;
  if(durNum<=5) return COACH.generated["5-4-3-2-1"];
  if(["agotado","abrumado"].includes(moodKey)) return COACH.generated["body-scan"];
  if(["preocupado","bloqueado","desenfocado"].includes(moodKey)) return COACH.generated["journaling"];
  return COACH.generated["box-breathing"];
}

// ── CONVERSATION FLOW ─────────────────────────────────────────
function coachSay(text, delay=700){
  isLoading=true; sbtn.disabled=true; showTyping();
  setTimeout(()=>{
    hideTyping();
    addMsg("coach", text);
    isLoading=false;
    sbtn.disabled=input.value.trim().length===0;
  }, delay);
}

function handleInput(userText){
  const nm = userText.match(/(?:soy|me llamo|mi nombre es|llámame)\s+([A-ZÁÉÍÓÚa-záéíóúüñ]+)/i);
  if(nm) userName=nm[1];

  // Check if mood came from chip (already normalized)
  const chipMood = MOOD_MAP[userText.toLowerCase()];
  if(chipMood){ detectedMood=chipMood.key; detectedMoodLabel=chipMood.label; }
  else {
    const textMood = detectMoodFromText(userText);
    if(textMood){ detectedMood=textMood; detectedMoodLabel=COACH.reframes[textMood]?.emotion||textMood; }
  }

  if(phase==="greeting"){
    phase="exploring";
    const rf = detectedMood ? COACH.reframes[detectedMood] : null;
    if(rf){
      const reply = `Entiendo.\n\nLo que estás experimentando es ${rf.emotion} — y aquí viene algo importante:\n\n${rf.bio}\n\n${rf.normalize}`;
      coachSay(reply, 900);
      setTimeout(()=>{
        const emotionLabel = rf.emotion;
        addMsg("coach", `¿Te gustaría una práctica para trabajar con la ${emotionLabel}?\n\n¿Cuánto tiempo tienes ahora?`);
        setTimeout(()=>{
          addChips(["5 minutos","10 minutos","20 minutos"], t=>handleInput(t));
        }, 600);
      }, 2400);
    } else {
      coachSay(`Gracias por compartir eso conmigo.\n\nTu cuerpo y mente están respondiendo a algo real. Cuéntame un poco más: ¿qué es lo que más está pesando ahora mismo?`, 800);
      phase="deepening";
    }

  } else if(phase==="deepening"){
    phase="exploring";
    const rf2 = detectedMood ? COACH.reframes[detectedMood] : null;
    if(rf2){
      const reply2 = `Lo que describes es ${rf2.emotion}.\n\n${rf2.bio}\n\n${rf2.normalize}`;
      coachSay(reply2, 900);
      setTimeout(()=>{
        addMsg("coach", `¿Te gustaría una práctica para trabajar con la ${rf2.emotion}?\n\n¿Cuánto tiempo tienes ahora?`);
        setTimeout(()=>{
          addChips(["5 minutos","10 minutos","20 minutos"], t=>handleInput(t));
        }, 600);
      }, 2400);
    } else {
      coachSay(`Lo que describes tiene mucho sentido. ¿Cuánto tiempo tienes para una práctica ahora?`, 700);
      setTimeout(()=>addChips(["5 minutos","10 minutos","20 minutos"], t=>handleInput(t)), 1400);
    }

  } else if(phase==="exploring"){
    phase="practice";
    const content = matchContent(detectedMood, userText);
    if(content){
      coachSay(`Perfecto. Tengo exactamente lo que necesitas.\n\nEsta práctica trabaja directamente con lo que está pasando en tu sistema nervioso — es concreta y basada en evidencia.`, 900);
      setTimeout(()=>{
        renderCard(content);
        setTimeout(()=>{
          addMsg("coach","Toca la práctica para comenzar. Cuando termines, cuéntame cómo te sentiste — aquí estaré. 🌿");
          phase="followup";
        }, 1200);
      }, 1900);
    } else {
      const gen = pickGenerated(detectedMood, userText);
      coachSay(`Para lo que describes y el tiempo que tienes, te propongo esta práctica. Puedes hacerla ahora mismo, donde estés.`, 900);
      setTimeout(()=>{
        renderGeneratedCard(gen);
        setTimeout(()=>{
          addMsg("coach","Tómate el tiempo que necesitas. Cuando termines, cuéntame cómo te sentiste — aquí estaré. 🌿");
          phase="followup";
        }, 1200);
      }, 1900);
    }

  } else if(phase==="followup"){
    phase="done";
    const txt=userText.toLowerCase();
    let insight="";
    if(txt.includes("bien")||txt.includes("mejor")||txt.includes("ayudó")||txt.includes("funcio")||txt.includes("genial")){
      insight=`Eso que acabas de sentir es tu sistema nervioso parasimpático activándose — el nervio vago frenando la respuesta de estrés.\n\nEn CBT llamamos esto "evidencia conductual": tu cuerpo acaba de demostrar que tiene la capacidad de regularse.\n\nLleva algo contigo hoy: cuando notes que la ${detectedMoodLabel||"tensión"} aparece, recuerda que tienes una herramienta que funciona. No tienes que aguantar — puedes pausar 5 minutos y resetear.`;
    } else if(txt.includes("poco")||txt.includes("algo")||txt.includes("más o menos")||txt.includes("regular")){
      insight=`Normal — las prácticas de regulación no siempre dan un resultado dramático de inmediato. A veces es sutil.\n\nLo que sí pasó: interrumpiste el ciclo de activación aunque sea por unos minutos. Eso ya es importante.\n\nUna idea para llevar: cuando notes un pensamiento difícil, intenta decirte "estoy notando que mi mente está pensando en X" en vez de "X está pasando". Pequeño cambio de perspectiva, gran diferencia.`;
    } else {
      insight=`Gracias por ser honestx. No todas las prácticas encajan a la primera — es completamente normal.\n\nTe recomendaría probar una diferente. A veces el agotamiento o la frustración responden mejor al movimiento o al journaling que a la respiración.\n\nLo que sí hiciste bien: te diste un momento de pausa. Eso en sí mismo ya es regulación.`;
    }
    coachSay(insight, 900);
    setTimeout(()=>{
      addMsg("coach","¿Hay algo más que quieras explorar hoy? Estoy aquí.");
    }, 2800);
  }
}

// ── SEND ──────────────────────────────────────────────────────
function send(){
  const txt=input.value.trim();
  if(!txt||isLoading) return;
  input.value=""; input.style.height="auto"; sbtn.disabled=true;
  addMsg("user",txt);
  handleInput(txt);
}

input.addEventListener("input",function(){
  this.style.height="auto";
  this.style.height=Math.min(this.scrollHeight,100)+"px";
  sbtn.disabled=this.value.trim().length===0||isLoading;
});
input.addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sbtn.disabled)send();}
});

// ── INIT ──────────────────────────────────────────────────────
function newSession(){
  chat.innerHTML=""; closePlayer();
  phase="greeting"; detectedMood=null; detectedMoodLabel=null;
  userName=""; isLoading=false; init();
}

function init(){
  setTimeout(()=>{
    addMsg("coach","Hola, soy tu Coach SERO.\n\nEstoy aquí para ayudarte a entender lo que está pasando en tu mente y cuerpo, y encontrar una práctica que funcione para este momento.");
  },300);
  setTimeout(()=>{
    addMsg("coach","¿Qué está ocupando espacio en tu mente ahora mismo?");
    addMoods(m=>{ addMsg("user",`Me siento ${m}`); handleInput(m); });
  },1200);
}

init();
