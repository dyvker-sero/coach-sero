<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coach SERO</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--s1:#111;--s2:#181818;--s3:#222;--s4:#2a2a2a;--t1:#f0f0ee;--t2:#a0a09a;--t3:#585854;--t4:#323230;--line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.11);--g:#1DB954;--gdim:rgba(29,185,84,.10);--gglow:rgba(29,185,84,.20);--v:#a78bfa;--vdim:rgba(167,139,250,.10);--vglow:rgba(167,139,250,.22);--r:14px;--r2:10px;--rp:100px;--fb:"Inter",sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:500px;margin:0 auto;position:relative}
#hdr{flex-shrink:0;background:var(--s1);border-bottom:.5px solid var(--line);padding:11px 16px;display:flex;align-items:center;justify-content:space-between}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-wrap img{width:72px;height:28px;object-fit:contain;mix-blend-mode:screen}
.badge{font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--v);text-transform:uppercase;background:var(--vdim);border:.5px solid var(--vglow);padding:3px 8px;border-radius:var(--rp)}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:beat 2s ease-in-out infinite}
@keyframes beat{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
#chat{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
#chat::-webkit-scrollbar{width:2px}
#chat::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
.msg{display:flex;gap:9px;max-width:94%;animation:mi .3s ease both}
@keyframes mi{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.coach{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;margin-top:2px}
.av.cav{background:var(--vdim);border:.5px solid var(--vglow);color:var(--v)}
.av.uav{background:var(--gdim);border:.5px solid var(--gglow);font-size:11px;font-weight:600;color:var(--g)}
.bub{padding:11px 14px;border-radius:var(--r);font-size:14px;line-height:1.65;max-width:100%}
.coach .bub{background:var(--s2);border:.5px solid var(--line2);color:var(--t1);border-top-left-radius:4px}
.user .bub{background:var(--vdim);border:.5px solid var(--vglow);color:var(--t1);border-top-right-radius:4px}
.td{display:flex;gap:4px;padding:3px 1px}
.td span{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:dt 1.2s ease-in-out infinite}
.td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.pcard{background:var(--s2);border:.5px solid var(--gglow);border-radius:var(--r);padding:14px;margin:4px 0 0;cursor:pointer;transition:background .15s}
.pcard:hover{background:var(--s3)}
.pb{font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--g);margin-bottom:4px}
.pt{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.pd{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px}
.pf{display:flex;align-items:center;justify-content:space-between}
.pdur{font-size:11px;color:var(--t3)}
.pbtn{background:var(--g);color:#000;border:none;border-radius:var(--rp);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fb)}
.gcard{background:var(--s2);border:.5px solid var(--vglow);border-radius:var(--r);padding:14px;margin:4px 0 0}
.gb{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--v);text-transform:uppercase;margin-bottom:4px}
.gt{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:3px}
.gdur{font-size:11px;color:var(--t3);margin-bottom:12px}
.gs{display:flex;gap:9px;margin-bottom:9px}
.gsn{color:var(--v);font-weight:600;font-size:13px;flex-shrink:0;width:16px}
.gst{font-size:13px;color:var(--t2);line-height:1.55}
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:2px 0 4px}
.chip{background:var(--s2);border:.5px solid var(--line2);border-radius:var(--rp);padding:7px 13px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .15s;font-family:var(--fb);-webkit-tap-highlight-color:transparent}
.chip:hover,.chip:active{background:var(--s3);border-color:var(--v);color:var(--t1)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%}
.mbtn{background:var(--s2);border:.5px solid var(--line2);border-radius:var(--r2);padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mbtn:hover,.mbtn:active{border-color:var(--v);background:var(--s3)}
.me{font-size:20px;display:block;margin-bottom:3px}
.ml{font-size:10px;color:var(--t3);line-height:1.2}
#pm{display:none;position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:100;flex-direction:column}
#pm.open{display:flex}
#pi{margin:auto;width:calc(100% - 32px);max-width:460px;background:var(--s1);border:.5px solid var(--line2);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
#ph{padding:14px 16px 12px;border-bottom:.5px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
#ptyp{font-size:9px;font-weight:600;letter-spacing:1px;color:var(--g);text-transform:uppercase;margin-bottom:3px}
#ptit{font-size:15px;font-weight:600;color:var(--t1);line-height:1.3}
#pdur2{font-size:11px;color:var(--t3);margin-top:2px}
#pcl{background:var(--s2);border:.5px solid var(--line2);border-radius:50%;width:28px;height:28px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:14px}
#pcl:hover{background:var(--s3);color:var(--t1)}
#pfw{position:relative;width:100%;padding-bottom:56.25%;background:#000}
#pf2{position:absolute;inset:0;width:100%;height:100%;border:none}
#psb{padding:10px 16px;display:flex;align-items:center;gap:10px;background:var(--s2)}
.psl{width:48px;height:18px;object-fit:contain;mix-blend-mode:screen;flex-shrink:0}
.pst{font-size:11px;color:var(--t3);line-height:1.4}
.pst strong{color:var(--t2)}
#ia{flex-shrink:0;background:var(--s1);border-top:.5px solid var(--line);padding:10px 12px;display:flex;align-items:flex-end;gap:8px}
#mi{flex:1;background:var(--s2);border:.5px solid var(--line2);border-radius:var(--r);padding:10px 13px;font-size:14px;color:var(--t1);font-family:var(--fb);outline:none;resize:none;min-height:42px;max-height:100px;line-height:1.5;transition:border-color .2s;-webkit-appearance:none}
#mi:focus{border-color:var(--v)}
#mi::placeholder{color:var(--t4)}
#sb{width:40px;height:40px;flex-shrink:0;background:var(--v);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,transform .1s;-webkit-tap-highlight-color:transparent}
#sb:hover{background:#b99ff8}
#sb:active{transform:scale(.93)}
#sb:disabled{background:var(--s3);cursor:default}
#disc{flex-shrink:0;text-align:center;font-size:10px;color:var(--t4);padding:4px 12px 8px;background:var(--s1)}
#nb{background:none;border:.5px solid var(--line2);border-radius:var(--rp);padding:5px 10px;font-size:10px;color:var(--t3);cursor:pointer;font-family:var(--fb);transition:all .15s}
#nb:hover{border-color:var(--t3);color:var(--t2)}
</style>
</head>

    <div class="logo-wrap">
      <img id="logo1" src="" alt="SERO">
      <div class="badge">Coach</div>

    <div style="display:flex;align-items:center;gap:8px">
      <button id="nb" onclick="newSession()">Nueva sesion</button>
      <div class="ldot"></div>

  <div id="chat"></div>
  <div id="ia">

}

  const d=document.createElement("div");d.className="msg coach";d.id="typ";
  const a=document.createElement("div");a.className="av cav";a.textContent="\u2736";
  const b=document.createElement("div");b.className="bub";
  b.innerHTML='<div class="td"><span></span><span></span><span></span></div>';
  d.appendChild(a);d.appendChild(b);chat.appendChild(d);scrollEnd();
}
function hideT(){const e=document.getElementById("typ");if(e)e.remove();}
function say(text,delay){
  isLoading=true;sb.disabled=true;showT();
  setTimeout(()=>{hideT();addMsg("coach",text);isLoading=false;sb.disabled=inp.value.trim().length===0;},delay||700);
}
function chips(opts,cb){
  const w=document.createElement("div");w.className="chips";
  opts.forEach(o=>{
    const b=document.createElement("button");b.className="chip";b.textContent=o;
    b.onclick=()=>{w.remove();cb(o);};w.appendChild(b);
  });
  chat.appendChild(w);scrollEnd();
}
function moods(cb){
  const g=document.createElement("div");g.className="mgrid";
  MOODS.forEach(m=>{
    const b=document.createElement("button");b.className="mbtn";
    b.innerHTML='<span class="me">'+m.emoji+'</span><span class="ml">'+m.label+'</span>';
    b.onclick=()=>{g.remove();cb(m.key);};g.appendChild(b);
  });
  chat.appendChild(g);scrollEnd();
}
function renderCard(c){
  const d=document.createElement("div");d.className="pcard";
  d.innerHTML='<div class="pb">'+c.badge+'</div><div class="pt">'+c.title+'</div><div class="pd">'+c.desc+'</div><div class="pf"><span class="pdur">Duracion: '+c.dur+'</span><button class="pbtn">Comenzar \u2192</button></div>';
  d.querySelector(".pbtn").onclick=(e)=>{e.stopPropagation();openPl(c);};
  d.onclick=()=>openPl(c);
  chat.appendChild(d);scrollEnd();
  usedPractices.push(c.id);
}
function renderGen(p){
  const d=document.createElement("div");d.className="gcard";
  let s=p.steps.map((t,i)=>'<div class="gs"><span class="gsn">'+(i+1)+'.</span><span class="gst">'+t+'</span></div>').join("");
  d.innerHTML='<div class="gb">'+p.type+'</div><div class="gt">'+p.title+'</div><div class="gdur">Duracion: '+p.dur+'</div>'+s;
  chat.appendChild(d);scrollEnd();
  usedPractices.push(p.title);
}

// SELECCION DE PRACTICA
// Busca SOLO en type:"practice" cuyo moodKeys contiene exactamente el moodKey actual
// El contenido de Sapolsky tiene moodKeys:["education-only"] y NUNCA aparece aqui
function pickPractice(moodKey,durText){
  const dur=parseInt(durText)||5;
  // Candidatos: practice, moodKey match exacto, tiempo suficiente, no usado
  let cands=LIB.filter(c=>c.type==="practice"&&c.moodKeys.includes(moodKey)&&c.minTime<=dur+3&&!usedPractices.includes(c.id));
  if(!cands.length){
    // Si ya los usamos todos, ignorar el filtro de usados
    cands=LIB.filter(c=>c.type==="practice"&&c.moodKeys.includes(moodKey)&&c.minTime<=dur+3);
  }
  if(cands.length){
    cands.sort((a,b)=>Math.abs(parseInt(a.dur)-dur)-Math.abs(parseInt(b.dur)-dur));
    return{type:"lib",c:cands[0]};
  }
  // Fallback generado segun mood y tiempo
  let g;
  if(dur<=5)g=["ansiosx","nerviosx","estresadx","frustradx"].includes(moodKey)?GEN.box:GEN.ground;
  else if(["agotadx","desanimadx","abrumadx"].includes(moodKey))g=GEN.scan;
  else if(["bloqueadx","desenfocadx"].includes(moodKey))g=GEN.journal;
  else g=GEN.box;
  return{type:"gen",c:g};
}

// FLUJO CBT / MBCT
function handle(txt){
  const nm=txt.match(/(?:soy|me llamo|mi nombre es|llamame)\s+([A-Za-z\u00C0-\u024F]+)/i);
  if(nm)userName=nm[1];

  if(phase==="greeting"){
    // Buscar mood exacto por key, o por emotion en el texto
    const mo=MOODS.find(m=>m.key===txt)||MOODS.find(m=>txt.toLowerCase().includes(m.emotion));
    if(mo){
      currentMood=mo;phase="bio";
      say("Entiendo.\n\nLo que estas experimentando es "+mo.emotion+" — y aqui viene algo importante:\n\n"+mo.bio+"\n\n"+mo.norm,900);
      setTimeout(()=>{
        addMsg("coach","Te gustaria una practica para trabajar con la "+mo.emotion+"?\n\nCuanto tiempo tienes ahora?");
        setTimeout(()=>chips(["5 minutos","10 minutos","20 minutos"],t=>handle(t)),600);
      },2700);
    }else{
      phase="clarify";
      say("Gracias por compartir eso.\n\nCuentame un poco mas: de lo que sientes ahora, que es lo que mas esta pesando en tu cuerpo o mente?",800);
    }
  }
  else if(phase==="clarify"){
    const mo=MOODS.find(m=>txt.toLowerCase().includes(m.emotion)||txt.toLowerCase().includes(m.key.replace("x","")));
    if(mo){
      currentMood=mo;phase="bio";
      say("Lo que describes es "+mo.emotion+".\n\n"+mo.bio+"\n\n"+mo.norm,900);
      setTimeout(()=>{
        addMsg("coach","Cuanto tiempo tienes ahora para una practica?");
        setTimeout(()=>chips(["5 minutos","10 minutos","20 minutos"],t=>handle(t)),600);
      },2400);
    }else{
      phase="time";
      say("Lo que describes tiene mucho sentido. Cuanto tiempo tienes ahora para una practica?",700);
      setTimeout(()=>chips(["5 minutos","10 minutos","20 minutos"],t=>handle(t)),1400);
    }
  }
  else if(phase==="bio"||phase==="time"){
    phase="practice";
    const mk=currentMood?currentMood.key:"estresadx";
    const r=pickPractice(mk,txt);
    if(r.type==="lib"){
      say("Perfecto. Tengo exactamente lo que necesitas.\n\nEsta practica trabaja directamente con lo que esta pasando en tu sistema nervioso.",900);
      setTimeout(()=>{renderCard(r.c);setTimeout(()=>{addMsg("coach","Toca la practica para comenzar. Cuando termines cuentame como te sentiste.");phase="followup";},1200);},1900);
    }else{
      say("Para lo que describes y el tiempo que tienes, te propongo esta practica. Puedes hacerla donde estes.",900);
      setTimeout(()=>{renderGen(r.c);setTimeout(()=>{addMsg("coach","Tomale el tiempo que necesitas. Cuando termines cuentame como te sentiste.");phase="followup";},1200);},1900);
    }
  }
  else if(phase==="followup"){
    const t=txt.toLowerCase();
    const em=currentMood?currentMood.emotion:"lo que experimentaste";
    const ci=currentMood?currentMood.cbt:"Cada practica entrena tu sistema nervioso para responder con mas flexibilidad.";
    let rep="";
    if(t.includes("bien")||t.includes("mejor")||t.includes("ayudo")||t.includes("funciono")||t.includes("excelente")){
      rep="Eso que acabas de sentir es tu sistema nervioso parasimpatico activandose — el nervio vago frenando la respuesta de estres.\n\nEn CBT llamamos esto evidencia conductual: tu cuerpo acaba de demostrar que tiene la capacidad de regularse.\n\n"+ci+"\n\nRecuerda: cuando notes la "+em+" aparecer, ya tienes una herramienta. No tienes que aguantar.";
    }else if(t.includes("poco")||t.includes("algo")||t.includes("mas o menos")||t.includes("regular")){
      rep="Normal. Las practicas de regulacion no siempre dan resultado dramatico de inmediato. A veces es sutil.\n\nLo que si paso: interrumpiste el ciclo de activacion aunque sea por unos minutos. Eso ya importa.\n\n"+ci;
    }else if(t.includes("no")||t.includes("mal")||t.includes("igual")||t.includes("no funciono")){
      rep="Gracias por la honestidad — eso es lo que necesito para ayudarte mejor.\n\nNo todas las practicas encajan a la primera. El sistema nervioso a veces necesita un tipo diferente de intervencion.\n\n"+ci;
    }else{
      rep="Gracias por compartir eso.\n\n"+ci;
    }
    say(rep,900);phase="continue";
    setTimeout(()=>{
      setTimeout(()=>{addMsg("coach","Quieres seguir trabajando con esto? Puedo darte otra practica o explorar mas a fondo lo que esta pasando.");},500);
      setTimeout(()=>chips(["Quiero otra practica","Quiero entender mejor","Estoy bien, gracias"],t=>handle(t)),1100);
    },Math.min(rep.length*14+800,4000));
  }
  else if(phase==="continue"){
    const t=txt.toLowerCase();
    if(t.includes("practica")||t.includes("si,")||t.includes("quiero otra")||t.includes("si quiero")){
      phase="time";
      say("Perfecto. Cuanto tiempo tienes ahora?",600);
      setTimeout(()=>chips(["5 minutos","10 minutos","20 minutos"],t=>handle(t)),1200);
    }else if(t.includes("entender")||t.includes("explorar")||t.includes("sentir")||t.includes("mejor")){
      phase="explore";
      const em=currentMood?currentMood.emotion:"esto";
      say("Vamos mas profundo.\n\nEn CBT trabajamos con el triangulo pensamiento-emocion-conducta. Lo que sientes esta conectado con como interpretas la situacion.\n\nCuando aparece la "+em+", que tipo de pensamientos la acompanan? Por ejemplo: 'no voy a poder', 'esto es demasiado', 'no soy suficiente'...",900);
    }else if(t.includes("bien")||t.includes("gracias")||t.includes("listo")||t.includes("ok")){
      say("Me alegra que hayas tomado este espacio.\n\nRecuerda: la regulacion emocional es una habilidad que se entrena. Cada vez que pausas y usas una practica, construyes resiliencia.\n\nAqui estoy cuando lo necesites.",700);
      phase="done";
    }else{
      freeExplore(txt);
    }
  }
  else if(phase==="explore"||phase==="cbt"){
    freeExplore(txt);
  }
  else if(phase==="done"){
    phase="continue";
    say("Claro, sigamos. Que esta pasando?",500);
  }
}

function freeExplore(txt){
  const t=txt.toLowerCase();
  let rep="";
  if(t.includes("no puedo")||(t.includes("siempre")&&(t.includes("mal")||t.includes("sale")))||t.includes("nunca funciona")){
    rep="Noto un pensamiento que en CBT llamamos generalizacion: palabras como 'siempre', 'nunca', 'todo' expanden el problema mas alla de su alcance real.\n\nPrueba reformularlo: en lugar de 'nunca puedo', 'en este momento me esta costando'. Es un cambio pequeno que reduce la intensidad emocional.\n\nQue esta pasando concretamente ahora — no siempre, solo ahora?";
  }else if(t.includes("mi culpa")||t.includes("soy un")||t.includes("soy una")||t.includes("no sirvo")){
    rep="Lo que describes suena a personalizacion — asumir responsabilidad total por algo que tiene multiples causas.\n\nPregunta util: si un amigo estuviera exactamente en tu situacion, que le dirias? Usualmente somos mucho mas compasivos con otros que con nosotros mismos.\n\nQue le dirias a esa persona?";
  }else if(t.includes("y si")||t.includes("que pasa si")){
    rep="El cerebro esta saltando al peor escenario posible — pensamiento catastrofico.\n\nUna tecnica util: preguntate cual es el peor escenario REAL (no imaginario), cual es el MAS PROBABLE, y que harias si el peor ocurriera. Al hacerlo, muchas veces el miedo baja porque te das cuenta de que podrias manejarlo.\n\nCual es el escenario mas probable en tu situacion?";
  }else{
    rep="Lo que describes tiene mucho sentido dado lo que estas viviendo.\n\nEn MBCT hay un principio clave: los pensamientos no son hechos — son eventos mentales que aparecen y desaparecen. No tienes que creerles ni pelear con ellos. Solo observarlos.\n\nHay algo concreto en lo que te gustaria trabajar ahora?";
  }
  say(rep,900);phase="continue";
  setTimeout(()=>chips(["Quiero una practica ahora","Seguir explorando","Estoy bien, gracias"],t=>handle(t)),Math.min(rep.length*14+800,4000));
}

// ENVIO
function send(){
  const txt=inp.value.trim();if(!txt||isLoading)return;
  inp.value="";inp.style.height="auto";sb.disabled=true;
  addMsg("user",txt);handle(txt);
}
inp.addEventListener("input",function(){
  this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px";
  sb.disabled=this.value.trim().length===0||isLoading;
});
inp.addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();if(!sb.disabled)send();}});

// INIT
function newSession(){chat.innerHTML="";closePl();phase="greeting";currentMood=null;userName="";isLoading=false;usedPractices=[];init();}
function init(){
  setTimeout(()=>addMsg("coach","Hola, soy tu Coach SERO.\n\nEstoy aqui para ayudarte a entender lo que esta pasando en tu mente y cuerpo, y encontrar una practica que funcione para este momento."),300);
  setTimeout(()=>{
    addMsg("coach","Que esta ocupando espacio en tu mente ahora mismo?");
    moods(key=>{const m=MOODS.find(x=>x.key===key);addMsg("user","Me siento "+(m?m.label:key));handle(key);});
  },1200);
}
init();
</script>
